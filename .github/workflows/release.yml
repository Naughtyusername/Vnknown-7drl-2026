name: Release Builds

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux
        run: |
          mkdir -p dist/linux
          odin build . -out:dist/linux/sdrl -target:linux_amd64 -o:speed -no-bounds-check
          chmod +x dist/linux/sdrl
          cp README.md dist/linux/ 2>/dev/null || true
          tar -czf sdrl-linux-x64-${{ github.ref_name }}.tar.gz -C dist/linux .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: sdrl-linux-x64-${{ github.ref_name }}.tar.gz

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        run: |
          mkdir -p dist/windows
          odin build . -out:dist/windows/sdrl.exe -target:windows_amd64 -o:speed -no-bounds-check
          cp README.md dist/windows/ 2>/dev/null || true
          (cd dist/windows && 7z a -tzip ../../sdrl-windows-x64-${{ github.ref_name }}.zip .)

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: sdrl-windows-x64-${{ github.ref_name }}.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS
        run: |
          mkdir -p dist/macos
          odin build . -out:dist/macos/sdrl_arm64 -target:darwin_arm64 -o:speed -no-bounds-check
          odin build . -out:dist/macos/sdrl_amd64 -target:darwin_amd64 -o:speed -no-bounds-check
          lipo -create -output dist/macos/sdrl dist/macos/sdrl_arm64 dist/macos/sdrl_amd64
          rm dist/macos/sdrl_arm64 dist/macos/sdrl_amd64
          chmod +x dist/macos/sdrl
          cp README.md dist/macos/ 2>/dev/null || true
          tar -czf sdrl-macos-universal-${{ github.ref_name }}.tar.gz -C dist/macos .

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: sdrl-macos-universal-${{ github.ref_name }}.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sdrl-linux-x64-${{ github.ref_name }}.tar.gz
            sdrl-windows-x64-${{ github.ref_name }}.zip
            sdrl-macos-universal-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
